name: Build Android & Release

on:
  push:
    branches: [ master ]
    paths-ignore:
      - 'README.md'

permissions:
  contents: write

# ─────────────────────────────────────────────
# STRATÉGIE DE VERSIONING
# pubspec.yaml contient : version: 1.0.3+0
#   → VERSION_NAME = 1.0.3  (lu depuis pubspec)
#   → BUILD_NUMBER = github.run_number (ex: 42)
#   → VERSION_FULL = 1.0.3.42  (utilisé partout)
#   → TAG = v1.0.3.42
# ─────────────────────────────────────────────

jobs:
  # ═══════════════════════════════════════════
  # JOB 0 – Extraire la version (partagée)
  # ═══════════════════════════════════════════
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.ver.outputs.version_name }}
      version_full: ${{ steps.ver.outputs.version_full }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Extraire VERSION_NAME depuis pubspec.yaml
        id: ver
        run: |
          VERSION_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1 | tr -d '[:space:]')
          VERSION_FULL="${VERSION_NAME}.${{ github.run_number }}"
          TAG="v${VERSION_FULL}"
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "version_full=${VERSION_FULL}"  >> $GITHUB_OUTPUT
          echo "tag=${TAG}"                    >> $GITHUB_OUTPUT
          echo "▶ VERSION_NAME = ${VERSION_NAME}"
          echo "▶ VERSION_FULL = ${VERSION_FULL}"
          echo "▶ TAG          = ${TAG}"

  # ═══════════════════════════════════════════
  # JOB 1 – Build Android APK
  # ═══════════════════════════════════════════
  build-android:
    needs: extract-version
    runs-on: ubuntu-latest
    env:
      VERSION_NAME: ${{ needs.extract-version.outputs.version_name }}
      VERSION_FULL: ${{ needs.extract-version.outputs.version_full }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Build APK release
        run: |
          flutter build apk --release \
            --build-name="${VERSION_NAME}" \
            --build-number=${{ github.run_number }} \
            --android-skip-build-dependency-validation

      - name: Vérification artefact
        run: ls -lh build/app/outputs/flutter-apk/app-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # ═══════════════════════════════════════════
  # JOB 2 – Release GitHub + Mise à jour README
  # ═══════════════════════════════════════════
  release-and-update:
    needs: [extract-version, build-android]
    runs-on: ubuntu-latest
    env:
      VERSION_NAME: ${{ needs.extract-version.outputs.version_name }}
      VERSION_FULL: ${{ needs.extract-version.outputs.version_full }}
      TAG:          ${{ needs.extract-version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Récupérer les artefacts ──────────────
      - name: Télécharger APK
        uses: actions/download-artifact@v4
        with:
          name: app-release.apk
          path: dist/

      # ── Créer la Release GitHub ──────────────
      - name: Créer la Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ env.TAG }}
          name:       "Release ${{ env.VERSION_FULL }}"
          body: |
            ## 🚀 SkillGrowth – Release ${{ env.VERSION_FULL }}

            | Plateforme | Fichier |
            |---|---|
            | 🤖 Android | [app-release.apk](https://github.com/${{ github.repository }}/releases/download/${{ env.TAG }}/app-release.apk) |
          files: dist/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Mettre à jour README.md ──────────────
      - name: Mettre à jour README.md
        run: |
          APK_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/app-release.apk"

          cat > README.md << 'HEREDOC'
          # 🚀 SkillGrowth
          ### *Advancing Skills through international collaboration*

          ---

          ## 📲 Download the App

          <p align="center">
          <a href="PLACEHOLDER_APK_URL" target="_blank">
            <img src="https://img.shields.io/badge/Android-APK_PLACEHOLDER_VERSION-3DDC84?style=for-the-badge&logo=android&logoColor=white" alt="Download Android APK"/>
          </a>
          </p>

          ---

          ## 📢 Highlights

          - **Version** : PLACEHOLDER_VERSION
          - **Release Date** : $(date +'%Y-%m-%d')

          ---

          ## 🛠️ Tech Stack

          - **Flutter** : Cross-platform UI framework
          - **Firebase** : Authentication & Cloud Firestore
          - **GitHub Actions** : Automated CI/CD pipeline

          ---

          ## 🖼️ Preview

          *Coming soon...*

          HEREDOC

          # Injecter les données dynamiques dans le README
          sed -i "s|PLACEHOLDER_APK_URL|${APK_URL}|g" README.md
          sed -i "s|PLACEHOLDER_VERSION|${VERSION_FULL}|g" README.md

          echo "✅ README.md mis à jour avec SkillGrowth"

      # ── Patcher pubspec.yaml avec version finale ─
      - name: Patcher pubspec.yaml (version finale)
        run: |
          sed -i "s/^version: .*/version: ${VERSION_NAME}+${{ github.run_number }}/" pubspec.yaml
          echo "✅ pubspec.yaml → version: ${VERSION_NAME}+${{ github.run_number }}"

      # ── Commit final [skip ci] ───────────────
      - name: Commit & push (version + README)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml README.md
          git diff --cached --quiet && echo "Rien à commiter" && exit 0
          git commit -m "chore: release ${VERSION_FULL} [skip ci]"
          git push origin master
